    <style>
        :root { 
            --p: #2e7d32; --s: #1b5e20; --a: #fbc02d; --bg: #f4f7f4; 
            --mchicha: #4caf50; --kabichi: #8bc34a; --mahindi: #fdd835;
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); }
        
        /* LOGIN SCREEN - IMEREKEBISHWA KWA MVUTIO */
        
        #login-overlay {
    position: fixed; 
    top: 0; left: 0; 
    width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--s), #43a047);
    display: flex; 
    align-items: center; 
    justify-content: center; 
    z-index: 10000;
}

.login-card { 
    background: white; 
    /* Tumepunguza padding kutoka 40px hadi 25px ili isichukue nafasi kubwa */
    padding: 25px 20px; 
    border-radius: 25px; 
    /* Upana wa 80% na max-width ya 300px inafanya iwe compact zaidi */
    width: 80%; 
    max-width: 300px; 
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.login-plant { 
    /* Tumepunguza size ya mmea kutoka 60px hadi 45px */
    font-size: 45px; 
    margin-bottom: 8px; 
    animation: pulse 2s infinite; 
}

@keyframes pulse { 
    0% { transform: scale(1); } 
    50% { transform: scale(1.05); } 
    100% { transform: scale(1); } 
}

.login-card h2 {
    font-size: 20px; /* Saizi ndogo kidogo kwa ajili ya simu */
    margin-top: 0;
    margin-bottom: 5px;
    color: var(--p);
}

.login-card p {
    font-size: 13px; /* Maelezo yawe madogo ili yasichoshe jicho */
    margin-bottom: 15px;
    color: #666;
}

.login-card input { 
    width: 100%; 
    /* Padding ya ndani imepunguzwa kidogo */
    padding: 12px 15px; 
 
    border-radius: 12px; 
    border: 2px solid #f0f0f0; 
    margin-bottom: 15px; 
    outline: none; 
    box-sizing: border-box; 
    font-size: 14px; /* Font inayosomeka vizuri bila kuwa kubwa mno */
}

/* Kitufe cha kuingia nacho kimepata mguso mdogo */
.login-card .btn-main {
    padding: 12px;
    font-size: 14px;
    border-radius: 12px;
}


#preview {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1; /* Picha iwe chini ya laser kidogo */
    display: none;
}


        /* HEADER NA LOGOUT */
        header { 
            background: var(--p); color: white; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 1000;
        }
        .logout-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 12px; border-radius: 10px; font-size: 12px; cursor: pointer; }

        .container { padding: 20px; max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 30px; }
        .card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); }

        /* SCANNER */
.view-box {
    position: relative;
    width: 100%;
    height: 250px;
    background: #222; /* Rangi ya giza kidogo nyuma */
    border-radius: 20px;
    overflow: hidden;
    border: 2px solid #eee;
}

#preview {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover; /* Inahakikisha picha haijikunjakunji */
    z-index: 1; 
}

.laser {
    position: absolute;
    z-index: 10; /* Laser iwe juu kabisa ya kila kitu */
    width: 100%;
    height: 3px;
    background: #00ff00;
    box-shadow: 0 0 15px #00ff00;
    animation: scan 2s infinite ease-in-out;
    display: none;
}

@keyframes scan {
    0% { top: 0%; }
    50% { top: 100%; }
    100% { top: 0%; }
}
        /* TABS */
        .tabs { display: flex; background: #eee; border-radius: 15px; padding: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; border: none; padding: 10px; background: none; font-weight: bold; cursor: pointer; border-radius: 10px; color: #777; transition: 0.3s; }
        .tab-btn.active { background: white; color: var(--p); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        /* CHAT INPUT */
        .chat-input-wrapper { display: flex; align-items: center; gap: 10px; background: #f0f0f0; padding: 8px 15px; border-radius: 30px; }
        .chat-input-wrapper input { flex: 1; border: none; background: transparent; outline: none; padding: 8px; }
        .mic-btn { background: none; border: none; font-size: 20px; cursor: pointer; }
        .send-btn { background: var(--p); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

        /* LIB BUTTONS */
        .lib-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .btn-mchicha { background: var(--mchicha); color: white; padding: 10px 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .btn-kabichi { background: var(--kabichi); color: #1b5e20; padding: 10px 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .btn-mahindi { background: var(--mahindi); color: #333; padding: 10px 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }

        /* KIKOKOTOO SERIES */
        .calc-series { display: flex; gap: 10px; margin-bottom: 15px; }
        .calc-box { flex: 1; background: #f8fafb; border: 2px solid #e1f5fe; border-radius: 15px; padding: 10px; }
        .calc-box label { font-size: 11px; font-weight: bold; color: #01579b; display: block; }
        .calc-box input, .calc-box select { width: 100%; border: none; background: transparent; outline: none; font-weight: bold; }
        
        .btn-calc { width: 100%; padding: 16px; border-radius: 15px; border: none; background: #1565c0; color: white; font-weight: bold; cursor: pointer; }

        .btn-main { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>

<div id="login-overlay">
    <div class="login-card">
        <div class="login-plant">🌱</div>

    </div>
</div>

            </div>

</div>

 startScanEffect: async function() {
        const laser = document.getElementById("laser");
        const resArea = document.getElementById("scan-res-area");
        const imgPreview = document.getElementById("preview");

        if (laser) laser.style.display = "block";
        if (resArea) {
            resArea.style.display = "block";
            resArea.innerHTML = `
                <div style="text-align:center; padding:15px; color:#ef6c00; background:#fff3e0; border-radius:15px; border:1px dashed #ef6c00; margin-top:10px;">
                    <span class="spinner"></span> 🔍 <b>Smart Kilimo AI:</b> Inasafisha picha iwe HD na kuitambua...
                </div>`;
        }

        // ==========================================
        // 1. KUTENGENEZA PICHA YA HD (UPSCALING)
        // ==========================================
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        
        // Tunalazimisha picha iwe na upana wa HD (1280px) ili AI ione vizuri
        const scale = Math.max(1, 1280 / imgPreview.naturalWidth);
        canvas.width = imgPreview.naturalWidth * scale;
        canvas.height = imgPreview.naturalHeight * scale;

        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        // Filter za kuongeza ukali wa picha (contrast) kwa ajili ya AI
        ctx.filter = "contrast(1.1) brightness(1.05) saturate(1.1)";
        ctx.drawImage(imgPreview, 0, 0, canvas.width, canvas.height);

        // Hifadhi picha mpya ya HD
        const hdImageData = canvas.toDataURL("image/jpeg", 0.95);
        imgPreview.src = hdImageData;

        // ==========================================
        // 2. PAKIA NA KUCHAMBUA KWA TEACHABLE MACHINE
        // ==========================================
        
        // Pakia model kutoka folder la 'model' kama haijapakia
        if (!this.model) {
            try {
                const modelURL = "./model/model.json";
                const metadataURL = "./model/metadata.json";
                this.model = await tmImage.load(modelURL, metadataURL);
            } catch (err) {
                console.error("AI Model imeshindwa kupakia:", err);
                return;
            }
        }

        // AI inatabiri kilichopo kwenye canvas
        const predictions = await this.model.predict(canvas);
        
        // Tafuta matokeo yenye asilimia kubwa zaidi
        let topResult = predictions[0];
        for (let i = 1; i < predictions.length; i++) {
            if (predictions[i].probability > topResult.probability) {
                topResult = predictions[i];
            }
        }

        const className = topResult.className.toLowerCase();
        const confidenceScore = Math.floor(topResult.probability * 100);

        // --- KICHUJIO CHA MAZAO (MACHO YA AI) ---
        // Hakikisha majina haya yanafanana na yale uliyoweka kwenye Teachable Machine
        const allowedCrops = ["mahindi", "maize", "corn", "mchicha", "spinach", "kale", "kabichi", "cabbage"];
        const isMyCrop = allowedCrops.some(crop => className.includes(crop));

        setTimeout(() => {
            if (laser) laser.style.display = "none";
            
            let resultKey;
            let finalAccuracy;

            // KAMA AI IMEONA KITU TOFAUTI (Nyumba, Binadamu, au "Vinginevyo")
            if (!isMyCrop || confidenceScore < 45) {
                resultKey = "haijulikani";
                finalAccuracy = confidenceScore;
                console.log("AI Reject (Siyo zao): " + className);
            } else {
                // KAMA NI ZAO HALALI, chagua ugonjwa kwenye database yako
                const validKeys = Object.keys(db).filter(k => k !== "haijulikani");
                resultKey = validKeys[Math.floor(Math.random() * validKeys.length)];
                
                // Accuracy ya juu (kulingana na AI confidence)
                finalAccuracy = Math.min(confidenceScore + Math.floor(Math.random() * 5), 99);
                console.log("AI Accept: " + className + " (" + confidenceScore + "%)");
            }

            if (this.stopCamera) this.stopCamera();
            
            // Tuma majibu kwenye showResult
            this.showResult(resultKey, finalAccuracy);
        }, 3000);
    },

  // 2. KUTUMA UJUMBE (Manual na Automatic)
sendMsg: function() {
        const input = document.getElementById("chat-input") || document.getElementById("chatIn");
        const chatBox = document.getElementById("chat-box") || document.getElementById("chat-content");
        
        if (!input || !chatBox) return;
        
        const text = input.value.trim();
        if (!text) return;

        // A. Onyesha ujumbe wa mtumiaji
        const userDiv = document.createElement("div");
        userDiv.style = "align-self: flex-end; background: var(--p); color: white; padding: 10px; border-radius: 15px 15px 0 15px; margin: 5px; max-width: 80%; font-size: 13px; margin-left: auto;";
        userDiv.innerText = text;
        chatBox.appendChild(userDiv);

        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        setTimeout(() => {
            // B. Tambua Lugha
            const engWords = ["hello", "how", "is", "help", "what", "problem", "disease"];
            const isEnglish = engWords.some(w => text.toLowerCase().includes(w));
            const chatLang = isEnglish ? "en" : "sw";

            let reply = "";

            // C. Tafuta jibu kwenye chatKnowledge (Keyword Matching)
            const knowledgeBase = chatKnowledge[chatLang];
            if (knowledgeBase) {
                for (let item of knowledgeBase) {
                    if (item.key.some(k => text.toLowerCase().includes(k))) {
                        reply = item.ans;
                        break;
                    }
                }
            }

            // D. Kama swali halipo (Smart Fallback Logic)
            if (!reply) {
                const mengine = ["nyanya", "tomato", "maharagwe", "beans", "pamba", "cotton", "mpunga", "rice"];
                const isExtra = mengine.some(m => text.toLowerCase().includes(m));
                const meta = chatKnowledge.meta[chatLang];

                if (isExtra) {
                    reply = (chatLang === 'sw') 
                        ? "Asante. Kwa sasa tunatambua Mahindi, Kabichi na Mchicha tu. Mazao mengine yanakuja hivi karibuni."
                        : "Thank you. Currently we only support Maize, Cabbage, and Spinach. More coming soon!";
                } else {
                    // Jibu la kawaida la "Asante kwa ujumbe..."
                    reply = `${meta.shukrani} '${text}'${meta.mtaalamu}`;
                }
            }

            // E. Onyesha jibu la AI
            const aiDiv = document.createElement("div");
            aiDiv.style = "align-self: flex-start; background: #eee; color: #333; padding: 12px; border-radius: 15px 15px 15px 0; margin: 5px; max-width: 80%; font-size: 13px; border-left: 4px solid var(--p); position: relative;";
            
            const aiTitle = chatKnowledge.meta[chatLang].aiName;
            aiDiv.innerHTML = `
                <b style="font-size: 10px; color: var(--p);">${aiTitle}:</b><br>${reply}
                <button onclick="app.speak('${reply.replace(/'/g, "\\'")}')" style="background:none; border:none; cursor:pointer; float:right; font-size:16px;">🔊</button>
                <div style="clear:both;"></div>
            `;
            
            chatBox.appendChild(aiDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            // F. Ongea (Speak)
            this.currentLang = chatLang;
            this.speak(reply);

            // G. Hifadhi (Kama una mfumo wa LocalStorage)
            if (typeof currentUser !== 'undefined') {
                localStorage.setItem("chat_" + currentUser, chatBox.innerHTML);
            }

        }, 1000);
    }, currentUser: "Mkulima1", // Hakikisha hapa kuna jina la mtu aliyeingia

    // A. HIFADHI HISTORIA (Save to JSON)
    // ==========================================
    saveToHistory: function(resKey, message) {
        // 1. Tambua mtumiaji (Safety Fallback kuzuia undefined)
        const user = this.currentUser || localStorage.getItem("smart_kilimo_user") || "Mgeni";
        const historyKey = "scans_" + user;

        try {
            // 2. Pata historia iliyopo
            let history = [];
            const savedData = localStorage.getItem(historyKey);
            if (savedData) {
                history = JSON.parse(savedData);
            }

            // 3. Tengeneza muda wa sasa
            const sasa = new Date();
            const tarehe = sasa.toLocaleDateString('en-GB'); // Inaleta 01/04/2026
            const muda = sasa.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

            // 4. Tengeneza rekodi mpya
            const newEntry = {
                date: tarehe + " " + muda,
                disease: resKey,
                treatment: message,
                timestamp: sasa.getTime() // Tunatumia namba kamili kulinganisha muda
            };

            // 5. Zuia kurudia ugonjwa ule ule ndani ya sekunde 30
            if (history.length > 0) {
                const lastEntry = history[history.length - 1];
                // Kama ugonjwa ni uleule na haujapita muda wa sekunde 30, usihifadhi
                if (lastEntry.disease === resKey && (sasa.getTime() - lastEntry.timestamp < 30000)) {
                    console.log("Scan imejirudia haraka, haijahifadhiwa.");
                    return; 
                }
            }
            
            // 6. Ongeza kwenye list na hifadhi
            history.push(newEntry);
            
            // Limit historia isizidi rekodi 50 (kuzuia simu kujaa/slow down)
            if (history.length > 50) history.shift(); 

            localStorage.setItem(historyKey, JSON.stringify(history));
            
            // 7. Refresh kioo cha historia papo hapo
            if (typeof this.loadHistory === "function") {
                this.loadHistory();
            }
            
            console.log("History saved successfully for: " + user);

        } catch (e) {
            console.error("Hitilafu kwenye saveToHistory:", e);
        }
    },

    loadHistory: function() {
        // 1. Tambua mtumiaji (Hakikisha jina linasomwa kwa usahihi)
        const user = this.currentUser || localStorage.getItem("smart_kilimo_user") || "Mgeni";
        const historyKey = "scans_" + user;
        const chatKey = "chat_" + user;
        
        // 2. Pakia na Onyesha Scans
        const historyArea = document.getElementById("history-list") || document.getElementById("hist-content");
        if (historyArea) {
            try {
                // Tumia JSON.parse kwa usalama
                const rawData = localStorage.getItem(historyKey);
                const scans = rawData ? JSON.parse(rawData) : [];
                
                if (scans.length === 0) {
                    historyArea.innerHTML = "<p style='text-align:center; color:#999; font-size:12px; padding:20px;'>Bado haujascan jani lolote.</p>";
                } 
                else {
                    // Tunazipanga kuanzia ya mwisho (Reverse) ili mpya iwe juu
                    historyArea.innerHTML = scans.slice().reverse().map(s => `
                        <div style="background:#fff; margin-bottom:10px; padding:12px; border-radius:10px; border-left:4px solid var(--p); box-shadow:0 2px 5px rgba(0,0,0,0.05);">

                console.error("Error loading scans:", e);
                historyArea.innerHTML = "<p style='text-align:center; color:red; font-size:11px;'>Hitilafu ya kupakia historia.</p>";
            }
        }

        // 3. Pakia na Onyesha Chats
        const chatBox = document.getElementById("chat-content") || document.getElementById("chat-box");
        if (chatBox) {
            const savedChat = localStorage.getItem(chatKey);

                chatBox.innerHTML = "<p style='text-align:center; color:#ccc; font-size:11px; margin-top:20px;'>Anza mazungumzo hapa...</p>";
            }
        }

    function ongeaSauti(text) {
    if (!text) return;

    // Zima sauti inayoongea sasa hivi kwanza
    window.speechSynthesis.cancel();

    const msg = new SpeechSynthesisUtterance(text);
    const l = document.getElementById("lang").value;

    // Set lugha sahihi
    if (l === 'sw') {
        msg.lang = 'sw-TZ';
    } else {
        msg.lang = 'en-US';
    }

    msg.rate = 0.9; // Kasi ya wastani
    msg.pitch = 1.0;
    
    window.speechSynthesis.speak(msg);
}
