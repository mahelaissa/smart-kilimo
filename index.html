<!DOCTYPE html> 
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Kilimo AI Pro</title>
    <style>
        :root { 
            --p: #2e7d32; --s: #1b5e20; --a: #fbc02d; --bg: #f4f7f4; 
            --mchicha: #4caf50; --kabichi: #8bc34a; --mahindi: #fdd835;
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); }
        
        /* LOGIN SCREEN - IMEREKEBISHWA KWA MVUTIO */
        
        #login-overlay {
    position: fixed; 
    top: 0; left: 0; 
    width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--s), #43a047);
    display: flex; 
    align-items: center; 
    justify-content: center; 
    z-index: 10000;
}

.login-card { 
    background: white; 
    /* Tumepunguza padding kutoka 40px hadi 25px ili isichukue nafasi kubwa */
    padding: 25px 20px; 
    border-radius: 25px; 
    /* Upana wa 80% na max-width ya 300px inafanya iwe compact zaidi */
    width: 80%; 
    max-width: 300px; 
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.login-plant { 
    /* Tumepunguza size ya mmea kutoka 60px hadi 45px */
    font-size: 45px; 
    margin-bottom: 8px; 
    animation: pulse 2s infinite; 
}

@keyframes pulse { 
    0% { transform: scale(1); } 
    50% { transform: scale(1.05); } 
    100% { transform: scale(1); } 
}

.login-card h2 {
    font-size: 20px; /* Saizi ndogo kidogo kwa ajili ya simu */
    margin-top: 0;
    margin-bottom: 5px;
    color: var(--p);
}

.login-card p {
    font-size: 13px; /* Maelezo yawe madogo ili yasichoshe jicho */
    margin-bottom: 15px;
    color: #666;
}

.login-card input { 
    width: 100%; 
    /* Padding ya ndani imepunguzwa kidogo */
    padding: 12px 15px; 
    border-radius: 12px; 
    border: 2px solid #f0f0f0; 
    margin-bottom: 15px; 
    outline: none; 
    box-sizing: border-box; 
    font-size: 14px; /* Font inayosomeka vizuri bila kuwa kubwa mno */
}

/* Kitufe cha kuingia nacho kimepata mguso mdogo */
.login-card .btn-main {
    padding: 12px;
    font-size: 14px;
    border-radius: 12px;
}


#preview {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1; /* Picha iwe chini ya laser kidogo */
    display: none;
}


        /* HEADER NA LOGOUT */
        header { 
            background: var(--p); color: white; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 1000;
        }
        .logout-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 12px; border-radius: 10px; font-size: 12px; cursor: pointer; }

        .container { padding: 20px; max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 30px; }
        .card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); }

        /* SCANNER */
        .view-box { position: relative; width: 100%; aspect-ratio: 1.2; border-radius: 20px; overflow: hidden; background: #000; margin-bottom: 15px; }
        .laser { position: absolute; width: 100%; height: 4px; background: #00ff00; box-shadow: 0 0 20px #00ff00; z-index: 20; animation: moveLaser 2s infinite linear; display: none; }
        @keyframes moveLaser { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        /* TABS */
        .tabs { display: flex; background: #eee; border-radius: 15px; padding: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; border: none; padding: 10px; background: none; font-weight: bold; cursor: pointer; border-radius: 10px; color: #777; transition: 0.3s; }
        .tab-btn.active { background: white; color: var(--p); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        /* CHAT INPUT */
        .chat-input-wrapper { display: flex; align-items: center; gap: 10px; background: #f0f0f0; padding: 8px 15px; border-radius: 30px; }
        .chat-input-wrapper input { flex: 1; border: none; background: transparent; outline: none; padding: 8px; }
        .mic-btn { background: none; border: none; font-size: 20px; cursor: pointer; }
        .send-btn { background: var(--p); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

        /* LIB BUTTONS */
        .lib-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .btn-mchicha { background: var(--mchicha); color: white; padding: 10px 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .btn-kabichi { background: var(--kabichi); color: #1b5e20; padding: 10px 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .btn-mahindi { background: var(--mahindi); color: #333; padding: 10px 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }

        /* KIKOKOTOO SERIES */
        .calc-series { display: flex; gap: 10px; margin-bottom: 15px; }
        .calc-box { flex: 1; background: #f8fafb; border: 2px solid #e1f5fe; border-radius: 15px; padding: 10px; }
        .calc-box label { font-size: 11px; font-weight: bold; color: #01579b; display: block; }
        .calc-box input, .calc-box select { width: 100%; border: none; background: transparent; outline: none; font-weight: bold; }
        
        .btn-calc { width: 100%; padding: 16px; border-radius: 15px; border: none; background: #1565c0; color: white; font-weight: bold; cursor: pointer; }

        .btn-main { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <div class="login-plant">🌱</div>
        <h2 style="color: var(--p); margin-top: 0;">Smart Kilimo AI</h2>
        <p style="color: #666; font-size: 14px;">Karibu, ingiza jina kuanza safari yako.</p>
        <input type="text" id="username" placeholder="Jina lako hapa...">
        <button onclick="app.login()" class="btn-main" style="background: var(--p);">INGIA SASA</button>
    </div>
</div>

<header>
    <span>🌽 Smart Kilimo</span>
    <button class="logout-btn" onclick="app.logout()">LOGOUT</button>
</header>

<div class="container" id="app-body" style="display: none;">
    
    <div class="card">
        <b id="user-tag" style="color: var(--p); display: block; margin-bottom: 10px;"></b>
        <div class="view-box">
            <div id="laser" class="laser"></div>
            <img id="preview" src="" style="display:none; width:100%; height:100%; object-fit:cover;">

            </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button onclick="app.startScanEffect()" class="btn-main" style="background: var(--p);">📷 KAMERA</button>
            <button onclick="document.getElementById('file-in').click()" class="btn-main" style="background: #1976d2;">📁 PAKIA</button>
        </div>
        <input type="file" id="camera-in" accept="image/*" capture="environment" hidden onchange="app.handleUpload(event)">
<input type="file" id="file-in" accept="image/*" hidden onchange="app.handleUpload(event)">
        <button onclick="app.speak()" class="btn-main" style="background: var(--a); color: #333; margin-top: 12px;">🔊 SIKILIZA TIBA</button>
    </div>

    <div class="card" style="padding: 0; overflow: hidden;">
        <div class="tabs" style="margin: 15px;">
            <button id="tab-c" class="tab-btn active" onclick="app.switchTab('chat')">🤖 Chat</button>
            <button id="tab-h" class="tab-btn" onclick="app.switchTab('hist')">📜 Historia</button>
        </div>
        <div id="chat-ui" style="padding: 0 15px 15px 15px;">
            <div id="chat-box" style="height: 150px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 12px; margin-bottom: 10px; font-size: 14px;">
                <div style="color:var(--p)"><b>AI:</b> Karibu! Naweza kukusaidia leo?</div>
            </div>
            <div class="chat-input-wrapper">
                <button class="mic-btn" onclick="app.startMic()">🎤</button>
               <input type="text" id="chat-input" 
           onkeypress="if(event.key === 'Enter') app.sendMsg()" 
           placeholder="Ongea au andika hapa..." 
           style="flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; outline: none;">
                <button class="send-btn" onclick="app.sendMsg()">🚀</button>
            </div>
        </div>
        <div id="hist-ui" style="display: none; padding: 20px; text-align: center; color: #999;">Hakuna historia bado.</div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; font-size: 16px;">📚 Maktaba</h3>
        <div class="lib-scroll">
            <button class="btn-mchicha" onclick="app.lib('mchicha')">🌿 Mchicha</button>
            <button class="btn-kabichi" onclick="app.lib('kabichi')">🥬 Kabichi</button>
            <button class="btn-mahindi" onclick="app.lib('mahindi')">🌽 Mahindi</button>
        </div>
        <div id="lib-box" style="margin-top:15px; font-size:14px; background:#f1f8e9; padding:15px; border-radius:15px;">Gusa zao...</div>
    </div>

    <div class="card" style="background: #e3f2fd;">
        <h3 style="margin:0 0 15px 0; color: #1565c0; font-size: 16px;">🧮 Kikokotoo</h3>
        <div class="calc-series">
            <div class="calc-box"><label>Ekari</label><input type="number" id="acres" placeholder="0"></div>
            <div class="calc-box">
                <label>Zao</label>
                <select id="crop-select">
                    <option value="mchicha">Mchicha</option>
                    <option value="kabichi">Kabichi</option>
                    <option value="mahindi">Mahindi</option>
                </select>
            </div>
        </div>
        <button class="btn-calc" onclick="app.calculate()">PIGA HESABU</button>
        <div id="calc-res" style="display:none; margin-top:10px; font-size:13px; background:white; padding:12px; border-radius:12px;"></div>
    </div>
</div>
<script>

    // --- 4. APP ENGINE ---
    const app = {
        currentUser: "",

      login: function() {
            const nameInput = document.getElementById("username");
            const name = nameInput.value.trim();
            
            if (name) {
                this.currentUser = name;
                // Tunahifadhi jina kwa kutumia KEY sahihi
                localStorage.setItem("smart_kilimo_user", name);
                
                // Zima kioo cha login na washa app
                document.getElementById("login-overlay").style.display = "none";
                document.getElementById("app-body").style.display = "block";
                
                // Onyesha jina la mkulima
                const userTag = document.getElementById("user-tag");
                if(userTag) userTag.innerText = "👤 Karibu, " + name;

                nameInput.focus();
            }
        },

        logout: function() {
            // Futa jina na historia ya muda (kama unataka)
            localStorage.removeItem("smart_kilimo_user");
            // Rudisha ukurasa upya
            location.reload();
        },

// 2. Inashughulikia urembo wa kuscani (Laser)
  startScanEffect: function() {
        const laser = document.getElementById("laser");
        const resArea = document.getElementById("scan-res-area");
        
        this.isScanning = true; // Tunazima sauti za vitufe vingine hapa
        laser.style.display = "block";
        resArea.style.display = "block";
        resArea.innerHTML = `<div style="text-align:center; padding:10px;">
            <p style="color:var(--p); font-weight:bold; margin:0;">🧪 AI Inatambua seli za mmea...</p>
            <small style="color:#666;">Tafadhali subiri...</small>
        </div>`;

        setTimeout(() => {
            laser.style.display = "none";
            this.isScanning = false;
            const keys = Object.keys(db);
            const resultKey = keys[Math.floor(Math.random() * keys.length)];
            const accuracy = Math.floor(Math.random() * (99 - 91 + 1)) + 91;
            
            this.showResult(resultKey, accuracy);
        }, 3000);
    },
       // 1. Inapokea picha (Kamera au Gallery)
    handleUpload: function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        const img = document.getElementById("preview");
        const laser = document.getElementById("laser");
        
        // 1. Zima kila kitu kabla ya kuanza
        laser.style.display = "none";
        img.style.display = "none";
        document.getElementById("scan-res-area").style.display = "none";
        this.lastScanResult = ""; // Safisha sauti ya zamani

        reader.onload = (e) => {
            img.src = e.target.result;
            // 2. Hakikisha picha inaonekana KWANZA
            img.style.display = "block";
            
            // 3. Subiri kidogo picha iwe "stable" ndipo laser ianze
            setTimeout(() => {
                this.startScanEffect();
            }, 800); 
        };
        reader.readAsDataURL(file);
    },

 // 3. Inaonyesha majibu (Inatibu tatizo la undefined na kuongeza Accuracy)
    showResult: function(resKey, accuracy = null) {
        if (!resKey || !db[resKey]) return;
        
        this.lastResKey = resKey; // Hifadhi jina la ugonjwa
        const result = db[resKey];
        const accDisplay = accuracy || this.lastAccuracy || 95;
        this.lastAccuracy = accDisplay;
        
        // Hakikisha lugha ipo, la sivyo tumia Kiswahili
        const message = result[this.currentLang] || result['sw'];
        this.lastScanResult = message;
        
        const resArea = document.getElementById("scan-res-area");
        const waMsg = encodeURIComponent(`Smart Kilimo Analysis (${accDisplay}% Accuracy): ${resKey}. Tiba: ${message}`);

        resArea.innerHTML = `
            <div style="background:#fff; padding:15px; border-radius:15px; border-left:5px solid var(--p); box-shadow:0 4px 10px rgba(0,0,0,0.1); animation: slideIn 0.4s ease;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <span style="background:var(--p); color:white; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:bold;">Accuracy: ${accDisplay}%</span>
                    <select onchange="app.changeLanguage(this.value)" style="font-size:11px; padding:3px; border-radius:5px; border:1px solid #ccc;">
                        <option value="sw" ${this.currentLang === 'sw' ? 'selected' : ''}>Kiswahili</option>
                        <option value="en" ${this.currentLang === 'en' ? 'selected' : ''}>English</option>
                    </select>
                </div>
                <b style="color:#d32f2f; font-size:15px; display:block; margin-bottom:5px;">${resKey}</b>
                <p id="diag-text" style="font-size:13px; color:#333; line-height:1.5; margin:0;">${message}</p>
                
                <a href="https://wa.me/255795023200?text=${waMsg}" target="_blank" 
                   style="display:flex; align-items:center; justify-content:center; gap:8px; background:#25d366; color:white; text-align:center; padding:12px; border-radius:12px; text-decoration:none; font-weight:bold; margin-top:12px; font-size:13px;">
                   <span>💬 Ongea na Mtaalamu (WhatsApp)</span>
                </a>
            </div>
        `;
        
        this.saveToHistory(resKey, message);
    },

    // 4. Inabadili lugha bila 'undefined'
    changeLanguage: function(lang) {
        this.currentLang = lang;
        if (this.lastResKey) {
            this.showResult(this.lastResKey, this.lastAccuracy);
        }
    },

    // 5. Sauti (Speak)
  // Inatibu tatizo la vitufe vingine kuongea majibu ya scan
    speak: function(customText = null) {
        // Kama tuko katikati ya kuscan, usiongee chochote
        if (this.isScanning) return;

        // Kama kuna maandishi maalum (mfano ya Chat au Historia), yatumie hayo
        // La sivyo, tumia jibu la scan ya mwisho
        let textToSay = customText || this.lastScanResult;

        if (!textToSay) {
            textToSay = this.currentLang === 'sw' ? "Bado sijaona jani. Hebu scan kwanza." : "No scan data yet.";
        }

        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(textToSay);
        msg.lang = this.currentLang === 'sw' ? 'sw-TZ' : 'en-US';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    },
      calculate: function() {
            const size = parseFloat(document.getElementById("acres").value);
            const crop = document.getElementById("crop-select").value;
            const resBox = document.getElementById("calc-res");

            if (!size || size <= 0) { alert("Weka idadi ya ekari!"); return; }

            let mbegu, mboleaDAP, mboleaUREA, mimea;
            let maelezo = "";

            if (crop === "mahindi") {
                mbegu = size * 10; 
                mboleaDAP = size * 50; 
                mboleaUREA = size * 50;
                mimea = size * 22000; 
                maelezo = `<b>Makadirio kwa Ekari ${size} za Mahindi:</b><br>
                           • Mbegu: Kilo ${mbegu}<br>
                           • Mbolea ya Kupanda (DAP): Kilo ${mboleaDAP}<br>
                           • Mbolea ya Kukuzia (UREA): Kilo ${mboleaUREA}<br>
                           • Idadi ya Mimea: Karibu ${mimea.toLocaleString()}`;
            } else if (crop === "kabichi") {
                mbegu = size * 200; 
                mimea = size * 11000;
                maelezo = `<b>Makadirio kwa Ekari ${size} za Kabichi:</b><br>
                           • Mbegu: Gramu ${mbegu}<br>
                           • Idadi ya Mimea: Karibu ${mimea.toLocaleString()}<br>
                           • Mwagilia lita 15,000 - 20,000 kwa msimu.`;
            } else {
                maelezo = `<b>Makadirio kwa Ekari ${size} za Mchicha:</b><br>
                           • Mbegu: Kilo 2 - 4 (Changanya na mchanga).<br>
                           • Samadi: Tani 5 - 10 kwa matokeo bora.`;
            }

            resBox.innerHTML = maelezo;
            resBox.style.display = "block";
            this.speak("Mahesabu yamekamilika.");
        },

        // TABS & LIBRARY
        switchTab: function(tab) {
            document.getElementById("chat-ui").style.display = tab === 'chat' ? 'block' : 'none';
            document.getElementById("hist-ui").style.display = tab === 'hist' ? 'block' : 'none';
            document.getElementById("tab-c").className = tab === 'chat' ? 'tab-btn active' : 'tab-btn';
            document.getElementById("tab-h").className = tab === 'hist' ? 'tab-btn active' : 'tab-btn';
        },

        lib: function(zao) {
            const box = document.getElementById("lib-box");
            box.innerHTML = cropGuides[zao];
            this.speak(box.innerText);
        },

        // CHAT ENGINE
     // Function ya Chat Box (Hakikisha haichukui lastScanResult kimakosa)
  // 2. KUTUMA UJUMBE (Manual na Automatic)
    sendMsg: function() {
        const input = document.getElementById("chat-input");
        const chatBox = document.getElementById("chat-box");
        const msg = input.value.trim();

        if (!msg) return; // Kama box lipo wazi, isitume

        // Onyesha ujumbe wa mtumiaji
        const userMsg = document.createElement("div");
        userMsg.style = "align-self: flex-end; background: var(--p); color: white; padding: 10px 15px; border-radius: 15px 15px 0 15px; margin: 5px; max-width: 80%; font-size: 13px;";
        userMsg.innerText = msg;
        chatBox.appendChild(userMsg);

        input.value = ""; // Safisha box ya kuandikia
        chatBox.scrollTop = chatBox.scrollHeight;

        // Jibu la AI
        setTimeout(() => {
            const reply = "Asante kwa ujumbe wako kuhusu '" + msg + "'. Mtaalamu atajibu hivi punde.";
            const aiMsg = document.createElement("div");
            aiMsg.style = "align-self: flex-start; background: #f0f0f0; color: #333; padding: 10px 15px; border-radius: 15px 15px 15px 0; margin: 5px; max-width: 80%; font-size: 13px;";
            aiMsg.innerHTML = `<b>Smart Kilimo:</b> <br>${reply}`;
            chatBox.appendChild(aiMsg);
            
            chatBox.scrollTop = chatBox.scrollHeight;
            
            // AI iongee jibu la chat (Isichanganye na majibu ya Scan)
            this.speak(reply);
        }, 1000);
    },
       // HISTORY
        saveToHistory: function(name) {
            let hist = JSON.parse(localStorage.getItem("kilimo_hist") || "[]");
            hist.unshift({ name, date: new Date().toLocaleTimeString() });
            localStorage.setItem("kilimo_hist", JSON.stringify(hist.slice(0, 10)));
        },

        loadHistory: function() {
        const box = document.getElementById("hist-ui");
            let hist = JSON.parse(localStorage.getItem("kilimo_hist") || "[]");
            box.innerHTML = hist.length ? hist.map(h => `<div style="padding:10px; border-bottom:1px solid #eee; text-align:left;">📜 <b>${h.name}</b> <small>(${h.date})</small></div>`).join("") : "Hakuna historia.";
        
    },
       // 1. MAIKROFONI (Inatuma Automatic)
    startMic: function() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("Browser yako haikubali Mic.");

        const recognition = new SpeechRecognition();
        recognition.lang = 'sw-TZ';
        const micBtn = document.querySelector(".mic-btn");
        const chatInput = document.getElementById("chat-input");

        recognition.onstart = () => {
            micBtn.innerHTML = "🔴";
            micBtn.style.color = "red";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            chatInput.value = transcript; // Inaweka maneno kwenye box

            // --- HAPA NDIPO INATUMA AUTOMATIC ---
            setTimeout(() => {
                this.sendMsg(); 
            }, 600); // Inasubiri nusu sekunde kisha inatuma
        };

        recognition.onend = () => {
            micBtn.innerHTML = "🎤";
            micBtn.style.color = "";
        };

        recognition.start();
    },
};
       window.onload = () => {
          const savedUser = localStorage.getItem("smart_kilimo_user");
        if (savedUser) {
            // Kama alishalogin, mwingize ndani moja kwa moja
            app.currentUser = savedUser;
            document.getElementById("login-overlay").style.display = "none";
            document.getElementById("app-body").style.display = "block";
            document.getElementById("user-tag").innerText = "👤 Karibu, " + savedUser;
            app.loadHistory();
        }
    };
</script>
