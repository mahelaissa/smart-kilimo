<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Kilimo AI Pro</title>
    <style>
        :root { 
            --p: #2e7d32; --s: #1b5e20; --a: #fbc02d; --bg: #f4f7f4; 
            --mchicha: #4caf50; --kabichi: #8bc34a; --mahindi: #fdd835;
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); }
        
        /* LOGIN SCREEN - IMEREKEBISHWA KWA MVUTIO */
        
        #login-overlay {
    position: fixed; 
    top: 0; left: 0; 
    width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--s), #43a047);
    display: flex; 
    align-items: center; 
    justify-content: center; 
    z-index: 10000;
}

.login-card { 
    background: white; 
    /* Tumepunguza padding kutoka 40px hadi 25px ili isichukue nafasi kubwa */
    padding: 25px 20px; 
    border-radius: 25px; 
    /* Upana wa 80% na max-width ya 300px inafanya iwe compact zaidi */
    width: 80%; 
    max-width: 300px; 
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.login-plant { 
    /* Tumepunguza size ya mmea kutoka 60px hadi 45px */
    font-size: 45px; 
    margin-bottom: 8px; 
    animation: pulse 2s infinite; 
}

@keyframes pulse { 
    0% { transform: scale(1); } 
    50% { transform: scale(1.05); } 
    100% { transform: scale(1); } 
}

.login-card h2 {
    font-size: 20px; /* Saizi ndogo kidogo kwa ajili ya simu */
    margin-top: 0;
    margin-bottom: 5px;
    color: var(--p);
}

.login-card p {
    font-size: 13px; /* Maelezo yawe madogo ili yasichoshe jicho */
    margin-bottom: 15px;
    color: #666;
}

.login-card input { 
    width: 100%; 
    /* Padding ya ndani imepunguzwa kidogo */
    padding: 12px 15px; 
    border-radius: 12px; 
    border: 2px solid #f0f0f0; 
    margin-bottom: 15px; 
    outline: none; 
    box-sizing: border-box; 
    font-size: 14px; /* Font inayosomeka vizuri bila kuwa kubwa mno */
}

/* Kitufe cha kuingia nacho kimepata mguso mdogo */
.login-card .btn-main {
    padding: 12px;
    font-size: 14px;
    border-radius: 12px;
}


        /* HEADER NA LOGOUT */
        header { 
            background: var(--p); color: white; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 1000;
        }
        .logout-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 12px; border-radius: 10px; font-size: 12px; cursor: pointer; }

        .container { padding: 20px; max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 30px; }
        .card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); }

        /* SCANNER */
        .view-box { position: relative; width: 100%; aspect-ratio: 1.2; border-radius: 20px; overflow: hidden; background: #000; margin-bottom: 15px; }
        .laser { position: absolute; width: 100%; height: 4px; background: #00ff00; box-shadow: 0 0 20px #00ff00; z-index: 20; animation: moveLaser 2s infinite linear; display: none; }
        @keyframes moveLaser { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        /* TABS */
        .tabs { display: flex; background: #eee; border-radius: 15px; padding: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; border: none; padding: 10px; background: none; font-weight: bold; cursor: pointer; border-radius: 10px; color: #777; transition: 0.3s; }
        .tab-btn.active { background: white; color: var(--p); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        /* CHAT INPUT */
        .chat-input-wrapper { display: flex; align-items: center; gap: 10px; background: #f0f0f0; padding: 8px 15px; border-radius: 30px; }
        .chat-input-wrapper input { flex: 1; border: none; background: transparent; outline: none; padding: 8px; }
        .mic-btn { background: none; border: none; font-size: 20px; cursor: pointer; }
        .send-btn { background: var(--p); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

        /* LIB BUTTONS */
        .lib-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .btn-mchicha { background: var(--mchicha); color: white; padding: 10px 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .btn-kabichi { background: var(--kabichi); color: #1b5e20; padding: 10px 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .btn-mahindi { background: var(--mahindi); color: #333; padding: 10px 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }

        /* KIKOKOTOO SERIES */
        .calc-series { display: flex; gap: 10px; margin-bottom: 15px; }
        .calc-box { flex: 1; background: #f8fafb; border: 2px solid #e1f5fe; border-radius: 15px; padding: 10px; }
        .calc-box label { font-size: 11px; font-weight: bold; color: #01579b; display: block; }
        .calc-box input, .calc-box select { width: 100%; border: none; background: transparent; outline: none; font-weight: bold; }
        
        .btn-calc { width: 100%; padding: 16px; border-radius: 15px; border: none; background: #1565c0; color: white; font-weight: bold; cursor: pointer; }

        .btn-main { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <div class="login-plant">🌱</div>
        <h2 style="color: var(--p); margin-top: 0;">Smart Kilimo AI</h2>
        <p style="color: #666; font-size: 14px;">Karibu, ingiza jina kuanza safari yako.</p>
        <input type="text" id="username" placeholder="Jina lako hapa...">
        <button onclick="app.login()" class="btn-main" style="background: var(--p);">INGIA SASA</button>
    </div>
</div>

<header>
    <span>🌽 Smart Kilimo</span>
    <button class="logout-btn" onclick="app.logout()">LOGOUT</button>
</header>

<div class="container" id="app-body" style="display: none;">
    
    <div class="card">
        <b id="user-tag" style="color: var(--p); display: block; margin-bottom: 10px;"></b>
        <div class="view-box">
            <div id="laser" class="laser"></div>
            <img id="preview" src="" style="display:none; width:100%; height:100%; object-fit:cover;">
        </div>
        <div id="scan-res-area" style="display:none; margin-bottom: 15px; padding: 15px; background: #f9f9f9; border-radius: 15px; border-left: 5px solid var(--p);">
            </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button onclick="app.startScanEffect()" class="btn-main" style="background: var(--p);">📷 KAMERA</button>
            <button onclick="document.getElementById('file-in').click()" class="btn-main" style="background: #1976d2;">📁 PAKIA</button>
        </div>
        <input type="file" id="file-in" hidden onchange="app.handleUpload(event)">
        <button onclick="app.speak('Matokeo bado hayajachakatwa')" class="btn-main" style="background: var(--a); color: #333; margin-top: 12px;">🔊 SIKILIZA TIBA</button>
    </div>

    <div class="card" style="padding: 0; overflow: hidden;">
        <div class="tabs" style="margin: 15px;">
            <button id="tab-c" class="tab-btn active" onclick="app.switchTab('chat')">🤖 Chat</button>
            <button id="tab-h" class="tab-btn" onclick="app.switchTab('hist')">📜 Historia</button>
        </div>
        <div id="chat-ui" style="padding: 0 15px 15px 15px;">
            <div id="chat-box" style="height: 150px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 12px; margin-bottom: 10px; font-size: 14px;">
                <div style="color:var(--p)"><b>AI:</b> Karibu! Naweza kukusaidia leo?</div>
            </div>
            <div class="chat-input-wrapper">
                <button class="mic-btn" onclick="app.startMic()">🎤</button>
                <input type="text" id="chat-input" placeholder="Uliza swali...">
                <button class="send-btn" onclick="app.sendMsg()">🚀</button>
            </div>
        </div>
        <div id="hist-ui" style="display: none; padding: 20px; text-align: center; color: #999;">Hakuna historia bado.</div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; font-size: 16px;">📚 Maktaba</h3>
        <div class="lib-scroll">
            <button class="btn-mchicha" onclick="app.lib('mchicha')">🌿 Mchicha</button>
            <button class="btn-kabichi" onclick="app.lib('kabichi')">🥬 Kabichi</button>
            <button class="btn-mahindi" onclick="app.lib('mahindi')">🌽 Mahindi</button>
        </div>
        <div id="lib-box" style="margin-top:15px; font-size:14px; background:#f1f8e9; padding:15px; border-radius:15px;">Gusa zao...</div>
    </div>

    <div class="card" style="background: #e3f2fd;">
        <h3 style="margin:0 0 15px 0; color: #1565c0; font-size: 16px;">🧮 Kikokotoo</h3>
        <div class="calc-series">
            <div class="calc-box"><label>Ekari</label><input type="number" id="acres" placeholder="0"></div>
            <div class="calc-box">
                <label>Zao</label>
                <select id="crop-select">
                    <option value="mchicha">Mchicha</option>
                    <option value="kabichi">Kabichi</option>
                    <option value="mahindi">Mahindi</option>
                </select>
            </div>
        </div>
        <button class="btn-calc" onclick="app.calculate()">PIGA HESABU</button>
        <div id="calc-res" style="display:none; margin-top:10px; font-size:13px; background:white; padding:12px; border-radius:12px;"></div>
    </div>
</div>
<script>
    // --- 1. VARIABLES NA CONFIGURATION ---
    let model, webcam, maxPredictions, lastSol = "", currentD = "", currentUser = "", currentTab = "chat";
    let lastChatReply = "";
    let isScanning = true; 
    const MODEL_URL = "./model/";

    // --- 2. DATABASE YA MAGONJWA ---
    
    // --- 1. DATA YA MAGONJWA (DISEASE DATA) ---
    const db = {
        "Cabbage Healthy": {
            "sw": "Kabichi yako haina ugonjwa. Endelea kumwagilia, tumia mbolea na linda dhidi ya wadudu.",
            "en": "Your cabbage is healthy. Continue watering, fertilizing, and pest control.",

        },
        "Black Rot": {
            "sw": "Black Rot: Majani yanakuwa ya njano yenye umbo la 'V' na mishipa myeusi. Tumia mbegu safi na epuka maji kusimama.",

            "img": "https://content.ces.ncsu.edu/media/images/black-rot-cabbage-v-shaped-lesion.JPG"
        },
        "Downy Mildew Cabbage": {

            "img": "https://gardenerspath.com/wp-content/uploads/2021/04/Downy-Mildew-on-Cabbage-Leaves.jpg"
        },
        "Maize Healthy": {
            "sw": "Mahindi yako yana afya. Endelea na matunzo bora kama palizi na mbolea ya kukuzia.",
            "en": "Your maize is healthy. Maintain good farming practices like weeding.",
            "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Zea_mays_-_Kohl-5.jpg/300px-Zea_mays_-_Kohl-5.jpg"
        },
        "MLN": {
            "sw": "MLN: Ugonjwa hatari wa virusi. Ukiona mmea unadumaa, ng'oa na uchome moto haraka sana.",
            "en": "MLN: Dangerous viral disease. If stunting occurs, uproot and burn the plant immediately.",
            "img": "https://pesticidestewardship.org/wp-content/uploads/2016/09/Maize-Lethal-Necrosis.jpg"
        },
        "MSV": {
            "sw": "MSV: Mistari ya njano kwenye mishipa ya jani. Dhibiti wadudu wa Leafhoppers na panda mbegu bora.",
            "en": "MSV: Yellow streaks along veins. Control Leafhoppers and plant resistant varieties.",
            "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Maize_streak_virus.jpg/300px-Maize_streak_virus.jpg"
        },
        "Common Rust": {
            "sw": "Common Rust: Madoa ya kahawia kama kutu pande zote za jani. Tumia fungicide mapema.",
            "en": "Common Rust: Brown pustules like rust on leaves. Apply fungicide early.",
            "img": "https://pesticidestewardship.org/wp-content/uploads/2016/09/Maize-Common-Rust.jpg"
        },
        "Northern Leaf Blight": {
            "sw": "Leaf Blight: Madoa marefu ya kijivu yanayofanana na sigara. Ondoa majani yaliyoathirika.",
            "en": "Leaf Blight: Long gray cigar-shaped spots. Remove infected leaves.",
            "img": "https://content.ces.ncsu.edu/media/images/Northern-Corn-Leaf-Blight-lesions-on-maize.jpg"
        },
        "Gray Leaf Spot": {
            "sw": "Gray Leaf Spot: Madoa ya kijivu ya mstatili kati ya mishipa. Punguza unyevu shambani.",
            "en": "Gray Leaf Spot: Gray rectangular lesions. Reduce humidity and ensure air circulation.",
            "img": "https://pesticidestewardship.org/wp-content/uploads/2016/09/Maize-Gray-Leaf-Spot.jpg"
        },
        "Spinach Healthy": {
            "sw": "Spinach yako ina afya. Ongeza mbolea ya samadi au ya majani (foliar booster).",
            "en": "Your spinach is healthy. Add manure or foliar fertilizer.",
            "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Spinach_leaves.jpg/300px-Spinach_leaves.jpg"
        },
        "Anthracnose": {
            "sw": "Anthracnose: Madoa meusi yaliyozama. Tumia fungicide na usiguse mimea ikiwa mibichi.",
            "en": "Anthracnose: Dark sunken spots. Apply fungicide; avoid handling wet plants.",
            "img": "https://extension.umd.edu/sites/extension.umd.edu/files/styles/optimized/public/2021-03/Anthracnose_Spinach.jpg"
        },
        "Bacterial Spot": {
            "sw": "Bacterial Spot: Madoa madogo ya majimaji. Tumia bactericides na epuka kumwagilia juu ya majani.",
            "en": "Bacterial Spot: Small water-soaked spots. Use bactericide.",
            "img": "https://agsci.oregonstate.edu/sites/agscid7/files/bacterial-leaf-spot-on-spinach.jpg"
        },
        "Downy Mildew Spinach": {
            "sw": "Downy Mildew: Ukungu wa zambarau chini ya majani. Punguza unyevu na nafasi iwe sahihi.",
            "en": "Downy Mildew: Purple growth under leaves. Reduce moisture.",
            "img": "https://agsci.oregonstate.edu/sites/agscid7/files/downy-mildew-on-spinach.jpg"
        },
        "Pest Damage": {
            "sw": "Uharibifu wa wadudu: Majani yana matundu. Tumia insecticide (mfano: Dudumeki) au Neem oil.",
            "en": "Pest damage: Holes on leaves. Use insecticide or Neem oil.",
            "img": "https://gardenerspath.com/wp-content/uploads/2021/05/Cabbage-Looper-Damage-on-Leaves.jpg"
        }
    };

    // --- 2. MAKTABA (LIBRARY GUIDES) ---
    const cropGuides = {
        "mahindi": `
            <h4 style="margin-top:0; color:#fbc02d; border-bottom:1px solid #ddd;">Kilimo cha Mahindi Bora 🌽</h4>
            <p><b>1. Mbegu:</b> Ekari moja kilo 8-10. Nafasi sm 75x25.</p>
            <p><b>2. Mbolea:</b> DAP (kupanda), UREA (wiki 3-4).</p>
            <p><b>3. Udhibiti:</b> Dhibiti Viwavi Jeshi kwa dawa kama Belt.</p>
            <p><b>4. Uvunaji:</b> Siku 90-120 baada ya kupanda.</p>`,
        "kabichi": `
            <h4 style="margin-top:0; color:#81c784; border-bottom:1px solid #ddd;">Kilimo cha Kabichi 🥬</h4>
            <p><b>1. Kitalu:</b> Hamisha miche baada ya wiki 4-6.</p>
            <p><b>2. Nafasi:</b> sm 60x60 kwa aina kubwa.</p>
            <p><b>3. Maji:</b> Inahitaji maji mengi asubuhi na jioni.</p>
            <p><b>4. Changamoto:</b> Kinga dhidi ya Black Rot na DBM.</p>`,
        "mchicha": `
            <h4 style="margin-top:0; color:#2e7d32; border-bottom:1px solid #ddd;">Kilimo cha Mchicha 🌿</h4>
            <p><b>1. Maandalizi:</b> Lima ardhi iwe laini sana.</p>
            <p><b>2. Upandaji:</b> Changanya mbegu na mchanga (1:3).</p>
            <p><b>3. Rutuba:</b> Samadi iliyooza na Foliar booster.</p>
            <p><b>4. Uvunaji:</b> Wiki 3 baada ya kupanda.</p>`
    };

    // --- 3. CHAT KNOWLEDGE (AI BRAIN) ---
    const chatKnowledge = {
        "sw": [
            { key: ["jinsi", "tumia"], ans: "Ili kunitumia: 1. Bonyeza Kamera au Pakia Jani. 2. Subiri AI isome picha. 3. Angalia ushauri chini ya picha." },
            { key: ["mbolea", "mahindi"], ans: "Kwa mahindi: Tumia DAP (kupanda) na UREA (kukuzia wiki ya 3-4)." },
            { key: ["mbolea", "kabichi"], ans: "Kabichi inahitaji samadi nyingi na NPK 10-10-10." },
            { key: ["mln", "virusi"], ans: "MLN haina tiba. Ng'oa mmea na uchome moto kuzuia kuenea." },
            { key: ["habari", "mambo"], ans: "Safi sana mkulima! Karibu. Una swali gani kuhusu mazao leo?" }
        ],
        "en": [
            { key: ["how", "use"], ans: "1. Click Camera or Upload a leaf. 2. Wait for AI scan. 3. See results below the image." },
            { key: ["fertilizer", "maize"], ans: "For maize: Use DAP for planting and UREA for top dressing." },
            { key: ["offline"], ans: "This app works offline once installed on your phone!" }
        ]
    };

    // --- 4. APP ENGINE ---
    const app = {
        currentUser: "",
        lastScanResult: "",

        login: function() {
            const name = document.getElementById("username").value.trim();
            if (name) {
                this.currentUser = name;
                localStorage.setItem("kilimo_user", name);
                document.getElementById("login-overlay").style.display = "none";
                document.getElementById("app-body").style.display = "block";
                document.getElementById("user-tag").innerText = "👤 Karibu, " + name;
                this.loadHistory();
            } else {
                alert("Weka jina kwanza!");
            }
        },

        logout: function() {
            localStorage.removeItem("kilimo_user");
            location.reload();
        },

    // SCANNING LOGIC
startScanEffect: function() {
            const laser = document.getElementById("laser");
            const resArea = document.getElementById("scan-res-area");
            const previewImg = document.getElementById("preview");

            // Hakikisha picha inaonekana kwanza
            if (!previewImg.src || previewImg.style.display === "none") {
                alert("Tafadhali pakia picha kwanza!");
                return;
            }

            laser.style.display = "block";
            resArea.style.display = "block";
            resArea.innerHTML = "<p style='color:orange; text-align:center; font-weight:bold;'>🔍 AI Inachakata picha...</p>";
            
            setTimeout(() => {
                laser.style.display = "none";
                const keys = Object.keys(db);
                const resultKey = keys[Math.floor(Math.random() * keys.length)];
                
                // MUHIMU: Hakikisha jina hapa linafanana na function yako ya majibu
                this.showResult(resultKey); 
            }, 2500);
        },

        handleUpload: function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById("preview");
                img.src = e.target.result;
                img.style.display = "block"; // Inaonyesha picha uliyopakia
                
                // Baada ya picha kuonekana, inaanza kuscani yenyewe
                this.startScanEffect();
            };
            reader.readAsDataURL(file);
        },

showResult: function(resKey) {
            const result = db[resKey];
            if (!result) return;

            // 1. Tunapata eneo la majibu tuliloweka kwenye HTML
            const resArea = document.getElementById("scan-res-area");
            
            // 2. Tunatunza jibu la mwisho kwa ajili ya kusomwa na sauti (Speak)
            this.lastScanResult = result.sw;

            // 3. Tunatengeneza ujumbe kwa ajili ya WhatsApp
            const waNumber = "255795023200"; // Badili na namba yako hapa
            const waMessage = encodeURIComponent(`Habari Mtaalamu, Smart Kilimo imegundua ugonjwa wa ${resKey} kwenye shamba langu. Maelezo: ${result.sw}`);
            const waLink = `https://wa.me/${waNumber}?text=${waMessage}`;

            // 4. Tunaweka majibu na link ya WhatsApp kwenye lile box la chini ya picha
            resArea.innerHTML = `
                <div style="font-size:14px; animation: fadeIn 0.5s;">
                    <b style="color:red; display:block; margin-bottom:5px;">⚠️ UTAMBUZI: ${resKey}</b>
                    <p style="margin: 0 0 10px 0; color: #333; line-height: 1.4;">${result.sw}</p>
                    <a href="${waLink}" target="_blank" 
                       style="display:flex; align-items:center; justify-content:center; gap:8px; background:#25d366; color:white; padding:10px; border-radius:12px; text-decoration:none; font-weight:bold; font-size:13px;">
                       <span>💬 Tuma kwa Mtaalamu (WhatsApp)</span>
                    </a>
                </div>
            `;
            
            // 5. Tunalionyesha box (maana mwanzo lilikuwa display:none)
            resArea.style.display = "block";

            // 6. Pia tunaweka jibu hili kwenye Chat Box kama kumbukumbu ya mazungumzo
            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML += `
                <div style="margin:10px 0; padding:10px; border-left:4px solid var(--p); background:#fff; font-size:13px;">
                    <b>AI:</b> Nimegundua <b>${resKey}</b>. <br>${result.sw}
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            // 7. Tunahifadhi kwenye Historia
            this.saveToHistory(resKey, result.sw);
        },

        speak: function(customText = null) {
            // Kama hakuna text iliyopitishwa, inachukua lile jibu la mwisho la scan
            const textToSpeak = customText || this.lastScanResult || "Samahani, bado huja-scan jani lolote. Tafadhali piga picha kwanza.";
            
            // Zima sauti yoyote inayoongea sasa hivi
            window.speechSynthesis.cancel();
            
            const msg = new SpeechSynthesisUtterance(textToSpeak);
            msg.lang = 'sw-TZ'; // Inatumia lugha ya Kiswahili
            msg.rate = 0.9;      // Kasi ya kuongea (0.9 ni nzuri kwa kueleweka)
            
            window.speechSynthesis.speak(msg);
        },

        // CALCULATOR
       calculate: function() {
            const size = parseFloat(document.getElementById("acres").value);
            const crop = document.getElementById("crop-select").value;
            const resBox = document.getElementById("calc-res");

            if (!size || size <= 0) { alert("Weka idadi ya ekari!"); return; }

            let mbegu, mboleaDAP, mboleaUREA, mimea;
            let maelezo = "";

            if (crop === "mahindi") {
                mbegu = size * 10; 
                mboleaDAP = size * 50; 
                mboleaUREA = size * 50;
                mimea = size * 22000; 
                maelezo = `<b>Makadirio kwa Ekari ${size} za Mahindi:</b><br>
                           • Mbegu: Kilo ${mbegu}<br>
                           • Mbolea ya Kupanda (DAP): Kilo ${mboleaDAP}<br>
                           • Mbolea ya Kukuzia (UREA): Kilo ${mboleaUREA}<br>
                           • Idadi ya Mimea: Karibu ${mimea.toLocaleString()}`;
            } else if (crop === "kabichi") {
                mbegu = size * 200; 
                mimea = size * 11000;
                maelezo = `<b>Makadirio kwa Ekari ${size} za Kabichi:</b><br>
                           • Mbegu: Gramu ${mbegu}<br>
                           • Idadi ya Mimea: Karibu ${mimea.toLocaleString()}<br>
                           • Mwagilia lita 15,000 - 20,000 kwa msimu.`;
            } else {
                maelezo = `<b>Makadirio kwa Ekari ${size} za Mchicha:</b><br>
                           • Mbegu: Kilo 2 - 4 (Changanya na mchanga).<br>
                           • Samadi: Tani 5 - 10 kwa matokeo bora.`;
            }

            resBox.innerHTML = maelezo;
            resBox.style.display = "block";
            this.speak("Mahesabu yamekamilika.");
        },

        // TABS & LIBRARY
        switchTab: function(tab) {
            document.getElementById("chat-ui").style.display = tab === 'chat' ? 'block' : 'none';
            document.getElementById("hist-ui").style.display = tab === 'hist' ? 'block' : 'none';
            document.getElementById("tab-c").className = tab === 'chat' ? 'tab-btn active' : 'tab-btn';
            document.getElementById("tab-h").className = tab === 'hist' ? 'tab-btn active' : 'tab-btn';
        },

        lib: function(zao) {
            const box = document.getElementById("lib-box");
            box.innerHTML = cropGuides[zao];
            this.speak(box.innerText);
        },

        // CHAT ENGINE
        sendMsg: function() {
            const input = document.getElementById("chat-input");
            const text = input.value.toLowerCase().trim();
            if (!text) return;

            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML += `<div style="text-align:right; font-size:13px; margin:5px 0;"><b>Wewe:</b> ${input.value}</div>`;
            
            let ans = "Samahani, sijapata jibu la hilo. Uliza kuhusu mbolea, magonjwa au jinsi ya kutumia app.";
            
            // Search in Swahili then English
            const allItems = [...chatKnowledge.sw, ...chatKnowledge.en];
            for (let item of allItems) {
                if (item.key.some(k => text.includes(k))) {
                    ans = item.ans;
                    break;
                }
            }

            setTimeout(() => {
                chatBox.innerHTML += `<div style="color:var(--p); font-size:13px; margin-bottom:10px;"><b>AI:</b> ${ans}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
                this.speak(ans);
            }, 600);
            input.value = "";
        },

        // HISTORY
        saveToHistory: function(name) {
            let hist = JSON.parse(localStorage.getItem("kilimo_hist") || "[]");
            hist.unshift({ name, date: new Date().toLocaleTimeString() });
            localStorage.setItem("kilimo_hist", JSON.stringify(hist.slice(0, 10)));
        },

        loadHistory: function() {
            const box = document.getElementById("hist-ui");
            let hist = JSON.parse(localStorage.getItem("kilimo_hist") || "[]");
            box.innerHTML = hist.length ? hist.map(h => `<div style="padding:10px; border-bottom:1px solid #eee; text-align:left;">📜 <b>${h.name}</b> <small>(${h.date})</small></div>`).join("") : "Hakuna historia.";
        }
    };

    window.onload = () => {
        const saved = localStorage.getItem("kilimo_user");
        if (saved) {
            document.getElementById("username").value = saved;
            app.login();
        }
    };
    startMic: function() {
            // 1. Angalia kama kivinjari kinasupport Speech Recognition
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                alert("Samahani, kivinjari chako hakisupport utambuzi wa sauti.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'sw-TZ'; // Inasikiliza Kiswahili cha Tanzania
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            const micBtn = document.querySelector(".mic-btn");
            const chatInput = document.getElementById("chat-input");

            // 2. Badilisha muonekano wa mic ikianza kusikiliza
            micBtn.style.color = "red";
            micBtn.innerHTML = "🔴"; // Inabadilika kuonyesha inarekodi

            recognition.start();

            // 3. Matokeo yakipatikana
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                chatInput.value = transcript; // Inajaza maandishi kwenye input box
                this.sendMsg(); // Inatuma ujumbe moja kwa moja
            };

            // 4. Ikimaliza kusikiliza (ama kwa kupata jibu au muda kuisha)
            recognition.onspeechend = () => {
                recognition.stop();
                micBtn.style.color = "";
                micBtn.innerHTML = "🎤";
            };

            // 5. Ikitokea kosa (mfano: mic imezimwa)
            recognition.onerror = (event) => {
                console.error(event.error);
                micBtn.style.color = "";
                micBtn.innerHTML = "🎤";
                alert("Kuna tatizo kwenye Maikrofoni: " + event.error);
            };
        },
</script>

</body>
</html>
