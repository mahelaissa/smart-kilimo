<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Kilimo AI Pro</title>
    <style>
        :root { 
            --p: #2e7d32; --s: #1b5e20; --a: #fbc02d; --bg: #f4f7f4; 
            --mchicha: #4caf50; --kabichi: #8bc34a; --mahindi: #fdd835;
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); }
        
        /* LOGIN SCREEN - IMEREKEBISHWA KWA MVUTIO */
        
        #login-overlay {
    position: fixed; 
    top: 0; left: 0; 
    width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--s), #43a047);
    display: flex; 
    align-items: center; 
    justify-content: center; 
    z-index: 10000;
}

.login-card { 
    background: white; 
    /* Tumepunguza padding kutoka 40px hadi 25px ili isichukue nafasi kubwa */
    padding: 25px 20px; 
    border-radius: 25px; 
    /* Upana wa 80% na max-width ya 300px inafanya iwe compact zaidi */
    width: 80%; 
    max-width: 300px; 
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.login-plant { 
    /* Tumepunguza size ya mmea kutoka 60px hadi 45px */
    font-size: 45px; 
    margin-bottom: 8px; 
    animation: pulse 2s infinite; 
}

@keyframes pulse { 
    0% { transform: scale(1); } 
    50% { transform: scale(1.05); } 
    100% { transform: scale(1); } 
}

.login-card h2 {
    font-size: 20px; /* Saizi ndogo kidogo kwa ajili ya simu */
    margin-top: 0;
    margin-bottom: 5px;
    color: var(--p);
}

.login-card p {
    font-size: 13px; /* Maelezo yawe madogo ili yasichoshe jicho */
    margin-bottom: 15px;
    color: #666;
}

.login-card input { 
    width: 100%; 
    /* Padding ya ndani imepunguzwa kidogo */
    padding: 12px 15px; 
    border-radius: 12px; 
    border: 2px solid #f0f0f0; 
    margin-bottom: 15px; 
    outline: none; 
    box-sizing: border-box; 
    font-size: 14px; /* Font inayosomeka vizuri bila kuwa kubwa mno */
}

/* Kitufe cha kuingia nacho kimepata mguso mdogo */
.login-card .btn-main {
    padding: 12px;
    font-size: 14px;
    border-radius: 12px;
}


        /* HEADER NA LOGOUT */
        header { 
            background: var(--p); color: white; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 1000;
        }
        .logout-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 12px; border-radius: 10px; font-size: 12px; cursor: pointer; }

        .container { padding: 20px; max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 30px; }
        .card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); }

        /* SCANNER */
        .view-box { position: relative; width: 100%; aspect-ratio: 1.2; border-radius: 20px; overflow: hidden; background: #000; margin-bottom: 15px; }
        .laser { position: absolute; width: 100%; height: 4px; background: #00ff00; box-shadow: 0 0 20px #00ff00; z-index: 20; animation: moveLaser 2s infinite linear; display: none; }
        @keyframes moveLaser { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        /* TABS */
        .tabs { display: flex; background: #eee; border-radius: 15px; padding: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; border: none; padding: 10px; background: none; font-weight: bold; cursor: pointer; border-radius: 10px; color: #777; transition: 0.3s; }
        .tab-btn.active { background: white; color: var(--p); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        /* CHAT INPUT */
        .chat-input-wrapper { display: flex; align-items: center; gap: 10px; background: #f0f0f0; padding: 8px 15px; border-radius: 30px; }
        .chat-input-wrapper input { flex: 1; border: none; background: transparent; outline: none; padding: 8px; }
        .mic-btn { background: none; border: none; font-size: 20px; cursor: pointer; }
        .send-btn { background: var(--p); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

        /* LIB BUTTONS */
        .lib-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .btn-mchicha { background: var(--mchicha); color: white; padding: 10px 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .btn-kabichi { background: var(--kabichi); color: #1b5e20; padding: 10px 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .btn-mahindi { background: var(--mahindi); color: #333; padding: 10px 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }

        /* KIKOKOTOO SERIES */
        .calc-series { display: flex; gap: 10px; margin-bottom: 15px; }
        .calc-box { flex: 1; background: #f8fafb; border: 2px solid #e1f5fe; border-radius: 15px; padding: 10px; }
        .calc-box label { font-size: 11px; font-weight: bold; color: #01579b; display: block; }
        .calc-box input, .calc-box select { width: 100%; border: none; background: transparent; outline: none; font-weight: bold; }
        
        .btn-calc { width: 100%; padding: 16px; border-radius: 15px; border: none; background: #1565c0; color: white; font-weight: bold; cursor: pointer; }

        .btn-main { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <div class="login-plant">🌱</div>
        <h2 style="color: var(--p); margin-top: 0;">Smart Kilimo AI</h2>
        <p style="color: #666; font-size: 14px;">Karibu, ingiza jina kuanza safari yako.</p>
        <input type="text" id="username" placeholder="Jina lako hapa...">
        <button onclick="app.login()" class="btn-main" style="background: var(--p);">INGIA SASA</button>
    </div>
</div>

<header>
    <span>🌽 Smart Kilimo</span>
    <button class="logout-btn" onclick="app.logout()">LOGOUT</button>
</header>

<div class="container" id="app-body" style="display: none;">
    
    <div class="card">
        <b id="user-tag" style="color: var(--p); display: block; margin-bottom: 10px;"></b>
        <div class="view-box">
            <div id="laser" class="laser"></div>
            <img id="preview" src="" style="display:none; width:100%; height:100%; object-fit:cover;">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button onclick="app.startScanEffect()" class="btn-main" style="background: var(--p);">📷 KAMERA</button>
            <button onclick="document.getElementById('file-in').click()" class="btn-main" style="background: #1976d2;">📁 PAKIA</button>
        </div>
        <input type="file" id="file-in" hidden onchange="app.handleUpload(event)">
        <button onclick="app.speak('Matokeo bado hayajachakatwa')" class="btn-main" style="background: var(--a); color: #333; margin-top: 12px;">🔊 SIKILIZA TIBA</button>
    </div>

    <div class="card" style="padding: 0; overflow: hidden;">
        <div class="tabs" style="margin: 15px;">
            <button id="tab-c" class="tab-btn active" onclick="app.switchTab('chat')">🤖 Chat</button>
            <button id="tab-h" class="tab-btn" onclick="app.switchTab('hist')">📜 Historia</button>
        </div>
        <div id="chat-ui" style="padding: 0 15px 15px 15px;">
            <div id="chat-box" style="height: 150px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 12px; margin-bottom: 10px; font-size: 14px;">
                <div style="color:var(--p)"><b>AI:</b> Karibu! Naweza kukusaidia leo?</div>
            </div>
            <div class="chat-input-wrapper">
                <button class="mic-btn" onclick="app.startMic()">🎤</button>
                <input type="text" id="chat-input" placeholder="Uliza swali...">
                <button class="send-btn" onclick="app.sendMsg()">🚀</button>
            </div>
        </div>
        <div id="hist-ui" style="display: none; padding: 20px; text-align: center; color: #999;">Hakuna historia bado.</div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; font-size: 16px;">📚 Maktaba</h3>
        <div class="lib-scroll">
            <button class="btn-mchicha" onclick="app.lib('mchicha')">🌿 Mchicha</button>
            <button class="btn-kabichi" onclick="app.lib('kabichi')">🥬 Kabichi</button>
            <button class="btn-mahindi" onclick="app.lib('mahindi')">🌽 Mahindi</button>
        </div>
        <div id="lib-box" style="margin-top:15px; font-size:14px; background:#f1f8e9; padding:15px; border-radius:15px;">Gusa zao...</div>
    </div>

    <div class="card" style="background: #e3f2fd;">
        <h3 style="margin:0 0 15px 0; color: #1565c0; font-size: 16px;">🧮 Kikokotoo</h3>
        <div class="calc-series">
            <div class="calc-box"><label>Ekari</label><input type="number" id="acres" placeholder="0"></div>
            <div class="calc-box">
                <label>Zao</label>
                <select id="crop-select">
                    <option value="mchicha">Mchicha</option>
                    <option value="kabichi">Kabichi</option>
                    <option value="mahindi">Mahindi</option>
                </select>
            </div>
        </div>
        <button class="btn-calc" onclick="app.calculate()">PIGA HESABU</button>
        <div id="calc-res" style="display:none; margin-top:10px; font-size:13px; background:white; padding:12px; border-radius:12px;"></div>
    </div>
</div>
<script>
    // --- 1. VARIABLES NA CONFIGURATION ---
    let model, webcam, maxPredictions, lastSol = "", currentD = "", currentUser = "", currentTab = "chat";
    let lastChatReply = "";
    let isScanning = true; 
    const MODEL_URL = "./model/";

    // --- 2. DATABASE YA MAGONJWA ---
    const db = {
        "Cabbage Healthy": {
            "sw": "Kabichi yako haina ugonjwa. Endelea kumwagilia, tumia mbolea na linda dhidi ya wadudu.",
            "en": "Your cabbage is healthy. Continue watering, fertilizing, and pest control.",
            "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Cabbage_Field.jpg/300px-Cabbage_Field.jpg"
        },
        "Black Rot": {
            "sw": "Black Rot: Majani yanakuwa ya njano yenye umbo la 'V' na mishipa myeusi. Tumia mbegu safi na epuka maji kusimama.",
            "en": "Black Rot: Causes V-shaped yellow leaves and black veins. Use clean seeds and avoid water stagnation.",
            "img": "https://content.ces.ncsu.edu/media/images/black-rot-cabbage-v-shaped-lesion.JPG"
        },
        "Downy Mildew Cabbage": {
            "sw": "Downy Mildew: Ukungu wa kijivu chini ya jani. Tumia fungicide (mfano: Copper) na punguza msongamano.",
            "en": "Downy Mildew: Grey mold under leaves. Use fungicide and reduce plant congestion.",
            "img": "https://gardenerspath.com/wp-content/uploads/2021/04/Downy-Mildew-on-Cabbage-Leaves.jpg"
        },
        "Maize Healthy": {
            "sw": "Mahindi yako yana afya. Endelea na matunzo bora kama palizi na mbolea ya kukuzia.",
            "en": "Your maize is healthy. Maintain good farming practices like weeding.",
            "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Zea_mays_-_Kohl-5.jpg/300px-Zea_mays_-_Kohl-5.jpg"
        },
        "MLN": {
            "sw": "MLN: Ugonjwa hatari wa virusi. Ukiona mmea unadumaa, ng'oa na uchome moto haraka sana.",
            "en": "MLN: Dangerous viral disease. If stunting occurs, uproot and burn the plant immediately.",
            "img": "https://pesticidestewardship.org/wp-content/uploads/2016/09/Maize-Lethal-Necrosis.jpg"
        },
        "MSV": {
            "sw": "MSV: Mistari ya njano kwenye mishipa ya jani. Dhibiti wadudu wa Leafhoppers na panda mbegu bora.",
            "en": "MSV: Yellow streaks along veins. Control Leafhoppers and plant resistant varieties.",
            "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Maize_streak_virus.jpg/300px-Maize_streak_virus.jpg"
        },
        "Common Rust": {
            "sw": "Common Rust: Madoa ya kahawia kama kutu pande zote za jani. Tumia fungicide mapema.",
            "en": "Common Rust: Brown pustules like rust on leaves. Apply fungicide early.",
            "img": "https://pesticidestewardship.org/wp-content/uploads/2016/09/Maize-Common-Rust.jpg"
        },
        "Northern Leaf Blight": {
            "sw": "Leaf Blight: Madoa marefu ya kijivu yanayofanana na sigara. Ondoa majani yaliyoathirika.",
            "en": "Leaf Blight: Long gray cigar-shaped spots. Remove infected leaves.",
            "img": "https://content.ces.ncsu.edu/media/images/Northern-Corn-Leaf-Blight-lesions-on-maize.jpg"
        },
        "Gray Leaf Spot": {
            "sw": "Gray Leaf Spot: Madoa ya kijivu ya mstatili kati ya mishipa. Punguza unyevu shambani.",
            "en": "Gray Leaf Spot: Gray rectangular lesions. Reduce humidity and ensure air circulation.",
            "img": "https://pesticidestewardship.org/wp-content/uploads/2016/09/Maize-Gray-Leaf-Spot.jpg"
        },
        "Spinach Healthy": {
            "sw": "Spinach yako ina afya. Ongeza mbolea ya samadi au ya majani (foliar booster).",
            "en": "Your spinach is healthy. Add manure or foliar fertilizer.",
            "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Spinach_leaves.jpg/300px-Spinach_leaves.jpg"
        },
        "Anthracnose": {
            "sw": "Anthracnose: Madoa meusi yaliyozama. Tumia fungicide na usiguse mimea ikiwa mibichi.",
            "en": "Anthracnose: Dark sunken spots. Apply fungicide; avoid handling wet plants.",
            "img": "https://extension.umd.edu/sites/extension.umd.edu/files/styles/optimized/public/2021-03/Anthracnose_Spinach.jpg"
        },
        "Bacterial Spot": {
            "sw": "Bacterial Spot: Madoa madogo ya majimaji. Tumia bactericides na epuka kumwagilia juu ya majani.",
            "en": "Bacterial Spot: Small water-soaked spots. Use bactericide.",
            "img": "https://agsci.oregonstate.edu/sites/agscid7/files/bacterial-leaf-spot-on-spinach.jpg"
        },
        "Downy Mildew Spinach": {
            "sw": "Downy Mildew: Ukungu wa zambarau chini ya majani. Punguza unyevu na nafasi iwe sahihi.",
            "en": "Downy Mildew: Purple growth under leaves. Reduce moisture.",
            "img": "https://agsci.oregonstate.edu/sites/agscid7/files/downy-mildew-on-spinach.jpg"
        },
        "Pest Damage": {
            "sw": "Uharibifu wa wadudu: Majani yana matundu. Tumia insecticide (mfano: Dudumeki) au Neem oil.",
            "en": "Pest damage: Holes on leaves. Use insecticide or Neem oil.",
            "img": "https://gardenerspath.com/wp-content/uploads/2021/05/Cabbage-Looper-Damage-on-Leaves.jpg"
        }
    };

    // --- 3. CHAT KNOWLEDGE BASE ---
    const chatKnowledge = {
        "sw": [
            { key: ["jinsi", "tumia", "kufanya"], ans: "Ili kunitumia: 1. Bonyeza Kamera au Pakia Jani. 2. Subiri AI isome. 3. Angalia ushauri chini." },
            { key: ["mbolea", "mahindi"], ans: "Kwa mahindi: Tumia DAP (kupanda), UREA (wiki 3-4), na CAN (mbelewele)." },
            { key: ["mbolea", "kabichi"], ans: "Kabichi inapenda samadi iliyooza na NPK 10-10-10 kwa vichwa vikubwa." },
            { key: ["mbolea", "mchicha"], ans: "Mchicha unahitaji Nitrojeni. Tumia samadi au Foliar kila baada ya kuvuna." },
            { key: ["wadudu", "funza"], ans: "Kwa funza wa mahindi, tumia Belt au Emamectin mapema asubuhi." },
            { key: ["habari", "mambo"], ans: "Safi sana mkulima! Karibu. Una swali gani kuhusu mazao leo?" }
        ],
        "en": [
            { key: ["how", "use"], ans: "1. Click Camera or Upload leaf. 2. Wait for AI scan. 3. Read the advice below." },
            { key: ["fertilizer", "maize"], ans: "Use DAP for planting, UREA for top dressing, and CAN during tasseling." }
        ]
    };

    // --- 4. LOGIN & AUTHENTICATION ---
    const app = {
        login: function() {
            const u = document.getElementById('username').value.trim();
            if(!u) return alert("Andika jina lako kwanza.");
            localStorage.setItem("active_farmer", u);
            currentUser = u;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-body').style.display = 'flex';
            document.getElementById('user-tag').innerText = "👤 Mkulima: " + u;
            this.loadData();
        },

        logout: function() {
            if(confirm("Je, unataka kutoka?")) {
                localStorage.removeItem("active_farmer");
                location.reload();
            }
        },

        loadData: function() {
            const user = localStorage.getItem("active_farmer");
            if(user) {
                const savedChat = localStorage.getItem("chat_" + user);
                if(savedChat) document.getElementById("chat-box").innerHTML = savedChat;
                const savedHist = localStorage.getItem("hist_" + user);
                if(savedHist) document.getElementById("hist-ui").innerHTML = savedHist;
            }
        }
    };

    // --- 5. SCANNER & MODEL LOGIC ---
    async function initModel() {
        if(!model) model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
    }

    async function handleUpload(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = document.getElementById('preview');
            img.src = ev.target.result;
            img.style.display = 'block';
            startScanEffect();
        };
        reader.readAsDataURL(file);
    }

    function startScanEffect() {
        const l = document.getElementById('laser');
        l.style.display = 'block';
        setTimeout(async () => {
            l.style.display = 'none';
            // Hapa AI inafanya kazi (Simulation ya matokeo ya jani)
            const result = "Maize Healthy"; // Mfano wa jibu la AI
            const msg = db[result].sw;
            alert("Scan Imekamilika: " + result);
            document.getElementById("chat-box").innerHTML += `<div style="color:var(--p)"><b>AI:</b> ${msg}</div>`;
            ongeaSauti(msg);
            saveHistory(result);
        }, 3000);
    }

    // --- 6. CHAT & SPEECH SYSTEM ---
    function sendMsg() {
        const inp = document.getElementById('chat-input');
        const txt = inp.value.trim().toLowerCase();
        if(!txt) return;

        const box = document.getElementById('chat-box');
        box.innerHTML += `<div style="text-align:right; margin-bottom:8px;"><b>Wewe:</b> ${txt}</div>`;
        
        let reply = "Samahani, sijaelewa. Uliza kuhusu mbolea au magonjwa ya mahindi.";
        const knowledge = chatKnowledge["sw"];
        for(let item of knowledge) {
            if(item.key.some(k => txt.includes(k))) { reply = item.ans; break; }
        }

        setTimeout(() => {
            box.innerHTML += `<div style="color:var(--p); margin-bottom:10px;"><b>AI:</b> ${reply}</div>`;
            box.scrollTop = box.scrollHeight;
            ongeaSauti(reply);
            localStorage.setItem("chat_" + currentUser, box.innerHTML);
        }, 800);
        inp.value = "";
    }

    function ongeaSauti(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'sw-TZ';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    // --- 7. MAKTABA & KIKOKOTOO ---
    const cropGuides = {
        "mahindi": "Mahindi: Tumia DAP kupanda. Nafasi sm 75x25. Palilia wiki ya 2 na ya 4.",
        "kabichi": "Kabichi: Inahitaji maji mengi na samadi iliyooza. Mwagilia kila siku.",
        "mchicha": "Mchicha: Vuna baada ya wiki 3-4. Ongeza mbolea ya majani baada ya kila mkato."
    };

    function lib(z) {
        const res = cropGuides[z] || "Chagua zao kuona maelezo.";
        document.getElementById('lib-box').innerText = res;
        ongeaSauti(res);
    }

    function calculate() {
        const size = document.getElementById('acres').value;
        const crop = document.getElementById('crop-select').value;
        if(!size || size <= 0) return alert("Ingiza ekari.");

        let res = "";
        if(crop === "mahindi") res = `Kwa ekari ${size}: Utahitaji kilo ${size*10} za mbegu na mifuko ${size} ya DAP.`;
        else if(crop === "kabichi") res = `Kwa ekari ${size}: Utahitaji miche ${size*11000} na maji mengi.`;
        else res = `Kwa ekari ${size}: Utahitaji kilo ${size*3} za mbegu za mchicha.`;

        const div = document.getElementById('calc-res');
        div.innerHTML = `<b>Matokeo:</b><br>${res}`;
        div.style.display = 'block';
        ongeaSauti(res);
    }

    function saveHistory(msg) {
        const ui = document.getElementById("hist-ui");
        if(ui.innerText.includes("Hakuna")) ui.innerHTML = "";
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        ui.innerHTML = `<div style="padding:5px; border-bottom:1px solid #eee;"><b>${time}:</b> ${msg}</div>` + ui.innerHTML;
        localStorage.setItem("hist_" + currentUser, ui.innerHTML);
    }

    function switchTab(t) {
        document.getElementById('chat-ui').style.display = t === 'chat' ? 'block' : 'none';
        document.getElementById('hist-ui').style.display = t === 'hist' ? 'block' : 'none';
        document.getElementById('tab-c').classList.toggle('active', t === 'chat');
        document.getElementById('tab-h').classList.toggle('active', t === 'hist');
    }

    // Start checking login on load
    window.onload = () => {
        const user = localStorage.getItem("active_farmer");
        if(user) {
            currentUser = user;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-body').style.display = 'flex';
            document.getElementById('user-tag').innerText = "👤 Mkulima: " + user;
            app.loadData();
        }
    };
</script>

</body>
</html>
